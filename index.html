<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleção de Cartas de Tarot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  body {
    background-color: #121212;
    color: #ffffff;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
  }

  .upload-section {
    margin-bottom: 20px;
    text-align: center;
  }

  input[type="file"] {
    background-color: #333;
    color: white;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #555;
    cursor: pointer;
    display: block;
    margin: 0 auto;
  }

  .button-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
  }

  .btn {
    background-color: #fce883;
    color: #121212;
    border: none;
    padding: 12px 20px;
    border-radius: 5px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    display: none; 
    transition: background-color 0.2s;
  }

  .btn:hover {
    background-color: #e6d376;
  }

  /* Botão de copiar com cor diferente para destacar */
  #btnCopiar {
    background-color: #4CAF50;
    color: white;
  }
  #btnCopiar:hover {
    background-color: #45a049;
  }

  .container {
    position: relative;
    display: none; 
    max-width: 900px;
    width: 100%;
    border-radius: 4px;
    overflow: hidden; 
  }

  .container img {
    display: block;
    width: 100%;
    height: auto;
  }

  .grid-overlay {
    position: absolute;
    top: 2%;      
    left: 1.5%;   
    width: 97%;   
    height: 96%;  
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);    
    gap: 1.5%;    
  }

  .card-area {
    cursor: pointer;
    border: 3px solid transparent;
    border-radius: 8px;
    transition: all 0.2s ease-in-out;
  }

  .card-area.selected {
    border-color: #fce883;
    background-color: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 15px rgba(252, 232, 131, 0.6);
  }
</style>
</head>
<body>

<div class="upload-section">
  <h3>1. Carregue sua imagem:</h3>
  <input type="file" id="imageUpload" accept="image/*">
  
  <div class="button-group">
    <button id="btnSalvar" class="btn" onclick="salvarImagem()">Salvar na Galeria</button>
    <button id="btnCopiar" class="btn" onclick="copiarImagem()">Copiar Selecionada</button>
  </div>
</div>

<div class="container" id="cardContainer">
  <img id="tarotImage" src="" alt="Cartas de Tarot">
  
  <div class="grid-overlay">
    <div class="card-area" onclick="toggleSelection(this)"></div>
    <div class="card-area" onclick="toggleSelection(this)"></div>
    <div class="card-area" onclick="toggleSelection(this)"></div>
    <div class="card-area" onclick="toggleSelection(this)"></div>
    
    <div class="card-area" onclick="toggleSelection(this)"></div>
    <div class="card-area" onclick="toggleSelection(this)"></div>
    <div class="card-area" onclick="toggleSelection(this)"></div>
    <div class="card-area" onclick="toggleSelection(this)"></div>
  </div>
</div>

<script>
  const imageUpload = document.getElementById('imageUpload');
  const tarotImage = document.getElementById('tarotImage');
  const cardContainer = document.getElementById('cardContainer');
  const btnSalvar = document.getElementById('btnSalvar');
  const btnCopiar = document.getElementById('btnCopiar');

  // Carregar Imagem
  imageUpload.addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        tarotImage.src = e.target.result;
        cardContainer.style.display = 'inline-block';
        btnSalvar.style.display = 'inline-block';
        btnCopiar.style.display = 'inline-block';
      }
      reader.readAsDataURL(file);
    }
  });

  // Selecionar Carta
  function toggleSelection(element) {
    element.classList.toggle('selected');
  }

  // --- NOVA FUNÇÃO: COPIAR IMAGEM RECORTADA ---
  async function copiarImagem() {
    const selectedCards = document.querySelectorAll('.card-area.selected');
    
    if (selectedCards.length === 0) {
      alert("Por favor, selecione pelo menos uma carta tocando nela.");
      return;
    }

    const textoOriginal = btnCopiar.innerText;
    btnCopiar.innerText = "Copiando...";

    try {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const imgRect = tarotImage.getBoundingClientRect();
      
      // Fator de escala entre a imagem na tela e a resolução real do arquivo
      const scaleX = tarotImage.naturalWidth / imgRect.width;
      const scaleY = tarotImage.naturalHeight / imgRect.height;

      // Descobrir o tamanho da área que precisamos recortar
      let minX = Infinity, minY = Infinity, maxX = 0, maxY = 0;
      const cardsData = [];

      selectedCards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const x = (rect.left - imgRect.left) * scaleX;
        const y = (rect.top - imgRect.top) * scaleY;
        const w = rect.width * scaleX;
        const h = rect.height * scaleY;

        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x + w > maxX) maxX = x + w;
        if (y + h > maxY) maxY = y + h;

        cardsData.push({ x, y, w, h });
      });

      // Configurar o tamanho final da imagem a ser copiada
      canvas.width = maxX - minX;
      canvas.height = maxY - minY;

      // Pintar o fundo de preto
      ctx.fillStyle = '#000000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Desenhar apenas as cartas selecionadas
      cardsData.forEach(c => {
        ctx.drawImage(
          tarotImage,
          c.x, c.y, c.w, c.h,                 // Pedaço da imagem original
          c.x - minX, c.y - minY, c.w, c.h    // Posição no novo recorte
        );
      });

      // Converter o desenho para imagem e copiar para a área de transferência
      canvas.toBlob(async function(blob) {
        try {
          const item = new ClipboardItem({ "image/png": blob });
          await navigator.clipboard.write([item]);
          
          btnCopiar.innerText = "Copiado! ✓";
          setTimeout(() => { btnCopiar.innerText = textoOriginal; }, 2000);
        } catch (err) {
          console.error("Erro no Clipboard API:", err);
          alert("Seu navegador não permitiu copiar direto. Tente o botão 'Salvar'.");
          btnCopiar.innerText = textoOriginal;
        }
      }, "image/png");

    } catch (error) {
      console.error(error);
      alert("Houve um erro ao recortar a imagem.");
      btnCopiar.innerText = textoOriginal;
    }
  }

  // --- FUNÇÃO ANTIGA DE SALVAR ---
  function salvarImagem() {
    const textoOriginal = btnSalvar.innerText;
    btnSalvar.innerText = "Preparando...";

    html2canvas(cardContainer, {
      scale: 2,
      backgroundColor: "#121212",
      useCORS: true
    }).then(function(canvas) {
      canvas.toBlob(function(blob) {
        const file = new File([blob], "minhas-cartas.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: 'Leitura de Cartas' })
            .then(() => { btnSalvar.innerText = textoOriginal; })
            .catch(() => { btnSalvar.innerText = textoOriginal; });
        } else {
          const link = document.createElement('a');
          link.download = 'minhas-cartas.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          btnSalvar.innerText = textoOriginal;
        }
      }, "image/png");
    });
  }
</script>

</body>
</html>
